name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Display .NET information
        run: dotnet --info

      - name: Restore dependencies
        run: dotnet restore HotJoes.sln

      - name: Build solution
        run: dotnet build HotJoes.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test HotJoes.sln --configuration Release --no-build